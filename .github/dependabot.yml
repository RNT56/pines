version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Berlin
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
      day: monday
      time: "08:20"
      timezone: Europe/Berlin
    groups:
      site:
        patterns:
          - "*"

  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:40"
      timezone: Europe/Berlin
