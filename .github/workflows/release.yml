name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: macos-26
    timeout-minutes: 60

    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Select Xcode with iPhoneOS SDK
        run: |
          selected=""
          for xcode in /Applications/Xcode*.app; do
            [ -d "$xcode" ] || continue
            sudo xcode-select -s "$xcode"
            if xcodebuild -showsdks | grep -q 'iphoneos'; then
              selected="$xcode"
              break
            fi
          done
          if [ -z "$selected" ]; then
            echo "No installed Xcode with an iPhoneOS SDK was found." >&2
            exit 1
          fi
          echo "Selected $selected"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Ensure iOS platform is installed
        run: |
          sudo xcodebuild -runFirstLaunch || true
          if ! xcodebuild -downloadPlatform iOS -architectureVariant universal; then
            echo "::warning::xcodebuild could not download the iOS platform on this runner."
          fi
          xcodebuild -showsdks

      - name: Public repo hygiene
        run: bash scripts/ci/check-public-hygiene.sh

      - name: Build Swift package
        run: swift build

      - name: Run core verification
        run: swift run PinesCoreTestRunner

      - name: Build unsigned iOS archive
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild \
            -project Pines.xcodeproj \
            -scheme Pines \
            -destination 'generic/platform=iOS' \
            -archivePath build/Pines.xcarchive \
            -derivedDataPath build/DerivedData \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            archive | tee build/archive.log

      - name: Package source release
        run: bash scripts/ci/package-release.sh "${{ steps.release-tag.outputs.tag }}"

      - name: Upload release validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pines-${{ steps.release-tag.outputs.tag }}-validation
          path: |
            build/archive.log
            dist/pines-${{ steps.release-tag.outputs.tag }}-source.tar.gz
            dist/pines-${{ steps.release-tag.outputs.tag }}-source.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download validation artifacts
        uses: actions/download-artifact@v4
        with:
          name: pines-${{ needs.validate.outputs.tag }}-validation
          path: release-artifacts

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-artifacts/* --clobber
          else
            gh release create "$TAG" \
              --title "pines $TAG" \
              --generate-notes \
              release-artifacts/*
          fi
