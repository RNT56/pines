name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: macos-26
    timeout-minutes: 120
    env:
      PINES_SIMULATOR_OPERATION_TIMEOUT_SECONDS: 180
      PINES_XCODE_TEST_TIMEOUT_SECONDS: 720
      PINES_XCODE_TEST_ATTEMPTS: 1
      PINES_XCODE_UI_SHARD_ATTEMPTS: 2
      PINES_XCODE_UI_TEST_MODE: smoke

    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Select Xcode and Metal toolchain
        run: bash scripts/ci/select-xcode.sh

      - name: Prepare pinned XcodeGen
        run: bash scripts/ci/xcodegen.sh --version

      - name: Ensure Apple platforms are installed
        run: bash scripts/ci/ensure-xcode-platforms.sh

      - name: Validate CI shell scripts
        run: bash -n scripts/ci/*.sh

      - name: Public repo hygiene
        run: bash scripts/ci/check-public-hygiene.sh

      - name: Build Swift package
        run: swift build --disable-automatic-resolution

      - name: Run Swift package tests
        run: swift test --disable-automatic-resolution

      - name: Run core verification
        run: swift run --disable-automatic-resolution PinesCoreTestRunner

      - name: Prepare Xcode validation snapshot
        run: bash scripts/ci/run-xcode-validation.sh prepare

      - name: Generate project and verify drift
        run: bash scripts/ci/run-xcode-validation.sh generate

      - name: Validate release project hygiene
        run: bash scripts/ci/check-release-build-hygiene.sh project

      - name: Resolve Xcode package dependencies
        run: bash scripts/ci/run-xcode-validation.sh resolve

      - name: Validate release build settings
        run: bash scripts/ci/check-release-build-hygiene.sh settings

      - name: Build unsigned iOS app
        run: bash scripts/ci/run-xcode-validation.sh build-app

      - name: Build simulator smoke tests
        run: bash scripts/ci/run-xcode-validation.sh build-tests

      - name: Run simulator smoke tests
        run: bash scripts/ci/run-xcode-validation.sh run-tests

      - name: Check final Xcode drift
        if: always()
        run: bash scripts/ci/run-xcode-validation.sh finalize

      - name: Build unsigned iOS archive
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild \
            -project Pines.xcodeproj \
            -scheme Pines \
            -destination 'generic/platform=iOS' \
            -archivePath build/Pines.xcarchive \
            -derivedDataPath build/DerivedData \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -onlyUsePackageVersionsFromResolvedFile \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            archive | tee build/archive.log

      - name: Validate archived app binary hygiene
        run: >-
          bash scripts/ci/check-release-build-hygiene.sh binary
          build/Pines.xcarchive/Products/Applications/pines.app/pines

      - name: Package source release
        run: bash scripts/ci/package-release.sh "${{ steps.release-tag.outputs.tag }}"

      - name: Upload release validation artifacts
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pines-${{ steps.release-tag.outputs.tag }}-validation
          path: |
            build/xcodebuild.log
            build/xcodebuild-tests.log
            build/xcodebuild-test-run.log
            build/archive.log
            dist/pines-${{ steps.release-tag.outputs.tag }}-source.tar.gz
            dist/pines-${{ steps.release-tag.outputs.tag }}-source.tar.gz.sha256
            dist/pines-${{ steps.release-tag.outputs.tag }}-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Attest release artifacts
        # actions/attest-build-provenance v4.1.1
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            dist/pines-${{ steps.release-tag.outputs.tag }}-source.tar.gz
            dist/pines-${{ steps.release-tag.outputs.tag }}-source.tar.gz.sha256
            dist/pines-${{ steps.release-tag.outputs.tag }}-sbom.cdx.json

  site:
    name: Validate release site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm --prefix site ci

      - name: Audit site dependencies
        run: npm --prefix site audit --audit-level=low

      - name: Build site
        run: npm --prefix site run build

      - name: Verify site artifact
        run: test -f site/dist/index.html

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - site
    timeout-minutes: 15

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download validation artifacts
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: pines-${{ needs.validate.outputs.tag }}-validation
          path: release-artifacts

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          mapfile -t release_files < <(find release-artifacts -type f | sort)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No release artifact files found." >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --prerelease
            gh release upload "$TAG" "${release_files[@]}" --clobber
          else
            gh release create "$TAG" \
              --title "pines $TAG" \
              --prerelease \
              --generate-notes \
              "${release_files[@]}"
          fi
