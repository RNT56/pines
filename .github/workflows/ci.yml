name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-core:
    name: Swift core checks
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print tool versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Public repo hygiene
        run: bash scripts/ci/check-public-hygiene.sh

      - name: Build Swift package
        run: swift build --disable-automatic-resolution

      - name: Run Swift package tests
        run: swift test --disable-automatic-resolution

      - name: Run core verification
        run: swift run --disable-automatic-resolution PinesCoreTestRunner

  xcode-project:
    name: Xcode project build
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode with iPhoneOS SDK
        run: |
          selected=""
          for xcode in /Applications/Xcode*.app; do
            [ -d "$xcode" ] || continue
            sudo xcode-select -s "$xcode"
            if xcodebuild -showsdks | grep -q 'iphoneos'; then
              selected="$xcode"
              break
            fi
          done
          if [ -z "$selected" ]; then
            echo "No installed Xcode with an iPhoneOS SDK was found." >&2
            exit 1
          fi
          echo "Selected $selected"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Ensure iOS platform is installed
        run: |
          sudo xcodebuild -runFirstLaunch || true
          if ! xcodebuild -downloadPlatform iOS -architectureVariant universal; then
            echo "::warning::xcodebuild could not download the iOS platform on this runner."
          fi
          xcodebuild -showsdks

      - name: Check generated project drift
        run: git diff --exit-code -- Pines.xcodeproj project.yml

      - name: Resolve package dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project Pines.xcodeproj \
            -scheme Pines \
            -skipMacroValidation \
            -skipPackagePluginValidation

      - name: Build iOS app without signing
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild \
            -project Pines.xcodeproj \
            -scheme Pines \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build/xcodebuild.log

      - name: Build iOS runtime smoke tests
        run: |
          set -o pipefail
          xcodebuild \
            -project Pines.xcodeproj \
            -scheme Pines \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing | tee build/xcodebuild-tests.log

      - name: Run iOS runtime smoke tests
        run: |
          set -o pipefail
          simulator_id="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')"
          if [ -z "$simulator_id" ]; then
            echo "::warning::No available iPhone simulator was found; smoke tests were build-verified only."
            exit 0
          fi
          xcodebuild \
            -project Pines.xcodeproj \
            -scheme Pines \
            -destination "id=$simulator_id" \
            -derivedDataPath build/DerivedData \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building | tee build/xcodebuild-test-run.log

      - name: Upload Xcode build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: |
            build/xcodebuild.log
            build/xcodebuild-tests.log
            build/xcodebuild-test-run.log
          if-no-files-found: ignore
          retention-days: 14
