name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-core:
    name: Swift core checks
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Print tool versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Public repo hygiene
        run: bash scripts/ci/check-public-hygiene.sh

      - name: Build Swift package
        run: swift build --disable-automatic-resolution

      - name: Run Swift package tests
        run: swift test --disable-automatic-resolution

      - name: Run core verification
        run: swift run --disable-automatic-resolution PinesCoreTestRunner

  xcode-project:
    name: Xcode project build
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Select Xcode with iPhoneOS SDK
        run: |
          selected=""
          for xcode in /Applications/Xcode*.app; do
            [ -d "$xcode" ] || continue
            sudo xcode-select -s "$xcode"
            if xcodebuild -showsdks | grep -q 'iphoneos'; then
              selected="$xcode"
              break
            fi
          done
          if [ -z "$selected" ]; then
            echo "No installed Xcode with an iPhoneOS SDK was found." >&2
            exit 1
          fi
          echo "Selected $selected"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Ensure Apple platforms are installed
        run: bash scripts/ci/ensure-xcode-platforms.sh

      - name: Validate Xcode project
        run: bash scripts/ci/run-xcode-validation.sh

      - name: Upload Xcode build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: |
            build/xcodebuild.log
            build/xcodebuild-tests.log
            build/xcodebuild-test-run.log
          if-no-files-found: ignore
          retention-days: 14
