name: MLX Upstream Sync

on:
  schedule:
    - cron: "17 7 1 * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upstream-sync-preflight:
    name: Upstream sync preflight
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Print tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Check MLX fork reachability and Pine integration hooks
        run: bash scripts/ci/check-mlx-upstream-sync.sh

      - name: Build Swift package
        run: swift build

      - name: Run core verification
        run: swift run PinesCoreTestRunner
