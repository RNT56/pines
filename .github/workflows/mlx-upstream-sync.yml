name: MLX Upstream Sync

on:
  schedule:
    - cron: "17 7 1 * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upstream-sync-preflight:
    name: Upstream sync preflight
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Print tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Check MLX fork reachability and Pine integration hooks
        run: bash scripts/ci/check-mlx-upstream-sync.sh

      - name: Build Swift package
        run: swift build --disable-automatic-resolution

      - name: Run core verification
        run: swift run --disable-automatic-resolution PinesCoreTestRunner
