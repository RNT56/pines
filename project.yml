name: Pines
options:
  bundleIdPrefix: com.schtack
  deploymentTarget:
    iOS: "17.0"
  # CI and release scripts execute this exact pinned release through scripts/ci/xcodegen.sh.
  minimumXcodeGenVersion: "2.45.4"
packages:
  PinesCore:
    path: .
  MLXSwift:
    url: https://github.com/RNT56/mlx-swift
    revision: 425d765aa7fa2b2cf111b9c43430054d82d02d07
  MLXSwiftLM:
    url: https://github.com/RNT56/mlx-swift-lm
    revision: 6335ec8a2e25cff94c93992cb921d7a0345b4a22
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.10.0
  SQLCipher:
    url: https://github.com/sqlcipher/SQLCipher.swift.git
    from: 4.10.0
  SwiftMarkdown:
    url: https://github.com/swiftlang/swift-markdown.git
    from: 0.8.0
  HighlightSwift:
    url: https://github.com/appstefan/highlightswift.git
    from: 1.1.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    WATCHOS_DEPLOYMENT_TARGET: "10.0"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  Pines:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Pines
        excludes:
          - IconComposer/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schtack.pines
        PRODUCT_NAME: pines
        INFOPLIST_FILE: Pines/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: "$(PINES_CODE_SIGN_ENTITLEMENTS)"
        # Personal Apple Developer teams cannot provision iCloud. Keep iCloud
        # signing and CloudKit runtime activation opt-in for paid-team builds.
        PINES_CODE_SIGN_ENTITLEMENTS: ""
        PINES_ICLOUD_SWIFT_FLAGS: ""
        OTHER_SWIFT_FLAGS: "$(inherited) $(PINES_ICLOUD_SWIFT_FLAGS)"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
        GCC_PREPROCESSOR_DEFINITIONS: "$(inherited) SQLITE_HAS_CODEC=1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WLDMWQ963U
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.1
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: PinesCore
        product: PinesCore
      - package: PinesCore
        product: PinesWatchSupport
      - package: PinesCore
        product: PinesHubXetSupport
      - package: MLXSwift
        product: MLX
      - package: MLXSwift
        product: MLXNN
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXVLM
      - package: MLXSwiftLM
        product: MLXEmbedders
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: SwiftTransformers
        product: Tokenizers
      - package: GRDB
        product: GRDB
      - package: SQLCipher
        product: SQLCipher
      - package: SwiftMarkdown
        product: Markdown
      - package: HighlightSwift
        product: HighlightSwift
      - target: PinesLiveActivities
        embed: true
      - target: PinesWatch
        embed: true
  PinesLiveActivities:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PinesLiveActivities
      - path: Pines/Runtime/ModelDownloadActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schtack.pines.liveactivities
        PRODUCT_NAME: PinesLiveActivities
        INFOPLIST_FILE: PinesLiveActivities/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WLDMWQ963U
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.1
        GENERATE_INFOPLIST_FILE: NO
  PinesWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: PinesWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schtack.pines.watchkitapp
        PRODUCT_NAME: Pines Watch
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.schtack.pines
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WLDMWQ963U
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.1
    dependencies:
      - package: PinesCore
        product: PinesWatchSupport
  PinesTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PinesTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schtack.pines.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WLDMWQ963U
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/pines.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/pines"
    dependencies:
      - target: Pines
      - package: PinesCore
        product: PinesCore
  PinesUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PinesUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schtack.pines.uitests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WLDMWQ963U
    dependencies:
      - target: Pines
schemes:
  Pines:
    build:
      targets:
        Pines: [test, run, profile, analyze, archive]
        PinesWatch: [test, run, profile, analyze, archive]
        PinesTests: [test]
        PinesUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - PinesTests
        - PinesUITests
  PinesWatch:
    build:
      targets:
        PinesWatch: all
    run:
      config: Debug
