description = "Synthetic JWT fixture used to verify Redactor behavior."
regexes = [
  '''eyJhbGciOiJIUzI1NiJ9\.eyJzdWIiOiJwZW5lcyJ9\.TJVA95OrM7E2cBab30RMHrHDcEfxjoYZgeFONFh7HgQ''',
]
