[extend]
useDefault = true

[[allowlists]]
description = "Ignore generated local artifacts that are never committed or released."
paths = [
  '''^build/''',
  '''^\.build/''',
  '''^\.git/''',
  '''^site/\.astro/''',
  '''^site/dist/''',
  '''^site/node_modules/''',
]

